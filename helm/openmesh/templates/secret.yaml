{{/*
  This secret is only created when API keys are provided directly in values
  (e.g. for development). In production, use external secrets (e.g. Sealed
  Secrets, External Secrets Operator) and reference them via llm.apiKeySecret.
*/}}
{{- if not .Values.llm.apiKeySecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openmesh.fullname" . }}-secrets
  labels:
    {{- include "openmesh.labels" . | nindent 4 }}
type: Opaque
data: {}
  # Populate via: kubectl create secret generic <name> --from-literal=api-key=<key>
{{- end }}
