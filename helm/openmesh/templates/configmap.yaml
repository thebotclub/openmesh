apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openmesh.fullname" . }}-config
  labels:
    {{- include "openmesh.labels" . | nindent 4 }}
data:
  # Place goal YAML files here or mount from an external source.
  # Example:
  # uptime.yaml: |
  #   goal: Ensure all services maintain 99.9% uptime
  #   observers:
  #     - type: http
  #       url: https://example.com
  #       interval: 30s
  .gitkeep: ""
